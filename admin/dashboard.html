<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--bg:#000;--card:#0a0a0a;--card2:#111;--bdr:rgba(255,255,255,.05);--bdr2:rgba(255,255,255,.1);--t:#fff;--t2:#888;--t3:#555;--cy:#06b6d4;--cy-bg:rgba(6,182,212,.08);--cy-bdr:rgba(6,182,212,.2);--red:#ef4444;--green:#22c55e;--yellow:#eab308}
    html,body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased}
    .page{max-width:720px;margin:0 auto;min-height:100vh;padding:0 16px}
    nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--bdr)}
    .nav-l{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px}
    .nav-l .dot{width:7px;height:7px;border-radius:50%;background:var(--cy);box-shadow:0 0 10px var(--cy)}
    .nav-logout{font-size:11px;color:var(--red);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;text-decoration:none;transition:.2s}
    .nav-logout:hover{background:rgba(239,68,68,.15)}
    .content{padding:20px 0 40px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
    .stat{padding:16px 10px;border-radius:14px;background:var(--card);border:1px solid var(--bdr);text-align:center}
    .stat .val{font-size:22px;font-weight:800;margin-bottom:2px}
    .stat .lbl{font-size:10px;color:var(--t3);font-weight:500}
    .stat:nth-child(1) .val{color:var(--cy)}
    .stat:nth-child(2) .val{color:var(--yellow)}
    .stat:nth-child(3) .val{color:var(--green)}
    .stat:nth-child(4) .val{color:var(--red)}
    .tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto}
    .tab{padding:7px 16px;border-radius:8px;font-size:11px;font-weight:600;color:var(--t3);background:var(--card);border:1px solid var(--bdr);cursor:pointer;white-space:nowrap;transition:.2s;font-family:inherit}
    .tab.on{color:var(--cy);border-color:var(--cy-bdr);background:var(--cy-bg)}
    .list{display:flex;flex-direction:column;gap:6px}
    .row{padding:14px 16px;border-radius:12px;background:var(--card);border:1px solid var(--bdr);animation:up .3s ease}
    @keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
    .row-email{font-size:13px;font-weight:600;word-break:break-all;flex:1}
    .badge{padding:2px 8px;border-radius:5px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
    .badge.pending{background:rgba(234,179,8,.1);color:var(--yellow)}
    .badge.valid{background:rgba(34,197,94,.1);color:var(--green)}
    .badge.tolak{background:rgba(239,68,68,.1);color:var(--red)}
    .row-meta{font-size:11px;color:var(--t3);display:flex;gap:12px;margin-bottom:10px}
    .row-actions{display:flex;gap:6px}
    .row-actions button{padding:7px 14px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;gap:4px}
    .btn-acc{background:rgba(34,197,94,.1);color:var(--green)}
    .btn-acc:hover{background:rgba(34,197,94,.2)}
    .btn-tolak{background:rgba(239,68,68,.1);color:var(--red)}
    .btn-tolak:hover{background:rgba(239,68,68,.2)}
    .btn-acc:disabled,.btn-tolak:disabled{opacity:.3;cursor:not-allowed}
    .empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}
    .empty i{font-size:28px;display:block;margin-bottom:10px;opacity:.3}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:99;transition:.4s;opacity:0;pointer-events:none;display:flex;align-items:center;gap:6px;backdrop-filter:blur(12px)}
    .toast.ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.2);color:var(--green)}
    .toast.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.2);color:var(--red)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}}
    ::-webkit-scrollbar{width:0;display:none}
  </style>
</head>
<body>
<div class="page">
  <nav>
    <div class="nav-l"><span class="dot"></span>Dashboard</div>
    <button class="nav-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </nav>
  <div class="content">
    <div class="stats">
      <div class="stat"><div class="val" id="sTotal">0</div><div class="lbl">Total</div></div>
      <div class="stat"><div class="val" id="sPend">0</div><div class="lbl">Pending</div></div>
      <div class="stat"><div class="val" id="sValid">0</div><div class="lbl">Valid</div></div>
      <div class="stat"><div class="val" id="sTolak">0</div><div class="lbl">Ditolak</div></div>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="load('all',this)">Semua</button>
      <button class="tab" onclick="load('pending',this)">Pending</button>
      <button class="tab" onclick="load('valid',this)">Valid</button>
      <button class="tab" onclick="load('tolak',this)">Ditolak</button>
    </div>
    <div class="list" id="list"></div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
if(!localStorage.getItem('token'))window.location.href='/admin/';
function toast(m,ok){var t=document.getElementById('toast');t.className='toast '+(ok?'ok':'err')+' show';t.innerHTML='<i class="fas fa-'+(ok?'check':'exclamation')+'-circle"></i>'+m;setTimeout(function(){t.classList.remove('show')},3000)}
function logout(){localStorage.removeItem('token');window.location.href='/admin/'}
var curFilter='all';
async function load(filter,el){
  curFilter=filter||curFilter;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});
  if(el)el.classList.add('on');else document.querySelector('.tab').classList.add('on');
  var list=document.getElementById('list');
  list.innerHTML='<div class="empty"><div style="width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;margin:0 auto"></div><style>@keyframes sp{to{transform:rotate(360deg)}}</style></div>';
  try{
    var r=await fetch('/api/data?filter='+curFilter,{headers:{'Authorization':'Bearer '+localStorage.getItem('token')}});
    var d=await r.json();
    if(d.error){toast(d.error,false);list.innerHTML='';return}
    document.getElementById('sTotal').textContent=d.stats.total;
    document.getElementById('sPend').textContent=d.stats.pending;
    document.getElementById('sValid').textContent=d.stats.valid;
    document.getElementById('sTolak').textContent=d.stats.tolak;
    if(!d.data.length){list.innerHTML='<div class="empty"><i class="fas fa-inbox"></i>Tidak ada data</div>';return}
    var html='';
    d.data.forEach(function(item){
      var cls=item.status==='valid'?'valid':item.status==='tolak'?'tolak':'pending';
      var label=item.status==='valid'?'Valid':item.status==='tolak'?'Ditolak':'Pending';
      var done=item.status!=='pending';
      html+='<div class="row"><div class="row-top"><span class="row-email">'+item.email+'</span><span class="badge '+cls+'">'+label+'</span></div><div class="row-meta"><span><i class="far fa-user" style="margin-right:3px"></i>'+item.nama+'</span><span><i class="far fa-clock" style="margin-right:3px"></i>'+item.waktu+'</span></div><div class="row-actions"><button class="btn-acc" onclick="aksi('+item.id+',\'acc\',this)"'+(done?' disabled':'')+'><i class="fas fa-check"></i> Valid</button><button class="btn-tolak" onclick="aksi('+item.id+',\'tolak\',this)"'+(done?' disabled':'')+'><i class="fas fa-times"></i> Tolak</button></div></div>';
    });
    list.innerHTML=html;
  }catch(e){list.innerHTML='<div class="empty"><i class="fas fa-exclamation-triangle"></i>Gagal memuat</div>'}
}
async function aksi(id,act,btn){
  btn.disabled=true;
  try{
    var url=act==='acc'?'/api/acc':'/api/tolak';
    var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+localStorage.getItem('token')},body:JSON.stringify({id:id})});
    var d=await r.json();
    if(d.ok)toast(act==='acc'?'Berhasil di-ACC':'Berhasil ditolak',true);
    else toast(d.error||'Gagal',false);
    load();
  }catch(e){toast('Gagal',false);btn.disabled=false}
}
load();
</script>
</body>
</html>
